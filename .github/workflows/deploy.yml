name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH (password auth, self-bootstrapping)
        uses: appleboy/ssh-action@v1.2.0
        env:
          # Falls back to the current GitHub repo if REPO_URL secret isn't set
          REPO_URL: ${{ secrets.REPO_URL || format('https://github.com/{0}.git', github.repository) }}
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port:     ${{ secrets.VPS_PORT || 22 }}
          envs:     REPO_URL
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail
            export DEBIAN_FRONTEND=noninteractive
            APP_DIR=/opt/misahuh-bawh

            # ── 1. Install Docker + git on first run ───────────────────────
            if ! command -v docker >/dev/null 2>&1; then
              echo "→ Installing Docker"
              apt-get update -y
              apt-get install -y ca-certificates curl git gnupg openssl
              install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
              chmod a+r /etc/apt/keyrings/docker.asc
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "${VERSION_CODENAME:-jammy}") stable" \
                > /etc/apt/sources.list.d/docker.list
              apt-get update -y
              apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
              systemctl enable --now docker
            fi

            # Make sure git is present even if Docker block was skipped
            command -v git >/dev/null 2>&1 || apt-get install -y git

            # ── 2. Clone or update the repo ─────────────────────────────────
            if [ ! -d "$APP_DIR/.git" ]; then
              echo "→ Cloning $REPO_URL"
              # If a partial/empty dir exists from a previous failed run, wipe it
              if [ -d "$APP_DIR" ]; then
                rm -rf "$APP_DIR"
              fi
              mkdir -p "$APP_DIR"
              git clone --depth=1 --branch main "$REPO_URL" "$APP_DIR"
            else
              echo "→ Pulling latest main"
              git -C "$APP_DIR" fetch --all --prune
              git -C "$APP_DIR" reset --hard origin/main
            fi

            # ── 3. Resolve .env from the server ─────────────────────────────
            # Source of truth: /root/misahuh.env  (you upload it once via SCP)
            # On every deploy, it gets copied into the project folder.
            if [ -f /root/misahuh.env ]; then
              echo "→ Copying /root/misahuh.env → $APP_DIR/.env"
              cp /root/misahuh.env "$APP_DIR/.env"
            elif [ -f "$APP_DIR/.env" ]; then
              echo "→ Using existing $APP_DIR/.env"
            else
              echo "✗ No .env found."
              echo "  Upload one first:  scp .env root@<vps>:/root/misahuh.env"
              exit 1
            fi
            chmod 600 "$APP_DIR/.env"

            # ── 4. Build + (re)start containers ────────────────────────────
            cd "$APP_DIR"
            docker compose up -d --build --remove-orphans
            docker image prune -f

            echo "✓ Deploy complete — http://$(hostname -I | awk '{print $1}')/"
