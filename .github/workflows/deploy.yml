name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            # Create app directory if not exists
            mkdir -p /app
            cd /app
            
            # If repo is not cloned yet, clone it (using HTTPS or SSH)
            if [ ! -d "bouh" ]; then
              git clone https://github.com/AhmedHassani/bouh.git bouh
            fi
            
            cd bouh
            
            # Pull latest code
            git checkout main
            git pull origin main
            
            # Write/Update .env file from secrets
            echo "${{ secrets.ENV_PRODUCTION }}" > .env
            
            # Build and run containers
            docker compose up -d --build --remove-orphans
            
            # Run Prisma migrations
            docker compose exec -T web sh -c "cd packages/db && npx prisma migrate deploy"
            
            # Cleanup unused docker images to save VPS space
            docker image prune -f
