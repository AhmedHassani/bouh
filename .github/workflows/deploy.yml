name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        id: img
        run: echo "name=ghcr.io/$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')/bouh-web" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.img.outputs.name }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port:     ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          command_timeout: 15m
          script: |
            set -e
            APP_DIR=/opt/misahuh-bawh
            REPO_URL=https://github.com/AhmedHassani/bouh.git

            if ! command -v docker >/dev/null 2>&1; then
              export DEBIAN_FRONTEND=noninteractive
              apt-get update -y
              apt-get install -y ca-certificates curl gnupg openssl git
              install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
              chmod a+r /etc/apt/keyrings/docker.asc
              CODENAME=$(. /etc/os-release && echo ${VERSION_CODENAME:-jammy})
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $CODENAME stable" > /etc/apt/sources.list.d/docker.list
              apt-get update -y
              apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
              systemctl enable --now docker
            fi

            command -v git >/dev/null 2>&1 || apt-get install -y git

            if [ ! -d "$APP_DIR/.git" ]; then
              [ -d "$APP_DIR" ] && rm -rf "$APP_DIR"
              git clone --depth=1 --branch main "$REPO_URL" "$APP_DIR"
            else
              cd "$APP_DIR"
              git fetch origin main
              git reset --hard origin/main
            fi
            cd "$APP_DIR"

            if [ ! -f .env ]; then
              PG=$(openssl rand -base64 24 | tr -d /+= | cut -c1-32)
              A=$(openssl rand -base64 48 | tr -d '\n')
              R=$(openssl rand -base64 48 | tr -d '\n')
              G=$(openssl rand -base64 48 | tr -d '\n')
              {
                echo "POSTGRES_USER=misahuh"
                echo "POSTGRES_PASSWORD=$PG"
                echo "POSTGRES_DB=misahuh"
                echo "JWT_ACCESS_SECRET=$A"
                echo "JWT_REFRESH_SECRET=$R"
                echo "JWT_GUEST_SECRET=$G"
                echo "PUSHER_APP_ID="
                echo "PUSHER_KEY="
                echo "PUSHER_SECRET="
                echo "PUSHER_CLUSTER="
                echo "NEXT_PUBLIC_PUSHER_KEY="
                echo "NEXT_PUBLIC_PUSHER_CLUSTER="
              } > .env
              chmod 600 .env
            fi

            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
