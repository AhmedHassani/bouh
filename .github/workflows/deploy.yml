name: Deploy to VPS

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create .env file for build
        run: |
          echo "${{ secrets.ENV_PRODUCTION }}" > .env

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/ahmedhassani/bouh-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "docker-compose.yml"
          target: "/opt/misahuh-bawh/"
          overwrite: true

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            # 1. Stop the old test project if it exists in /app/bouh to free up port 80
            if [ -d "/app/bouh" ]; then
              cd /app/bouh && docker compose down || true
            fi
            
            # 2. Go to the correct project folder
            mkdir -p /opt/misahuh-bawh
            cd /opt/misahuh-bawh
            
            # 3. Write/Update .env file from secrets
            echo "${{ secrets.ENV_PRODUCTION }}" > .env
            
            # 4. Log in to GHCR to pull the image
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # 5. Stop existing containers to avoid port conflict, then pull and run
            docker compose down || true
            docker compose pull web
            docker compose up -d --remove-orphans
            
            # 6. Cleanup unused docker images to save VPS space
            docker image prune -f
