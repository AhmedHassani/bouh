services:
  db:
    image: postgres:16-alpine
    container_name: misahuh-db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-misahuh}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-misahuh}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-misahuh} -d ${POSTGRES_DB:-misahuh}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    image: ghcr.io/ahmedhassani/bouh-web:latest
    container_name: misahuh-web
    restart: unless-stopped
    pull_policy: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-misahuh}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-misahuh}
      NODE_ENV: production
    ports:
      - "80:3000"

volumes:
  db-data:
