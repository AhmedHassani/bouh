services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bouh-web
    restart: always
    ports:
      - "80:3000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - bouh-network

  db:
    image: postgres:16-alpine
    container_name: bouh-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password}
      POSTGRES_DB: ${POSTGRES_DB:-bouh}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bouh"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bouh-network

volumes:
  postgres_data:

networks:
  bouh-network:
    driver: bridge
